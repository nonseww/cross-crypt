<svg width="100%" viewBox="0 0 720 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Discord OAuth2 — UML Sequence Diagram</title>
  <desc>UML Sequence Diagram с полосами активации: авторизация через Discord OAuth2 между Пользователем, Discord Bot, Backend и Discord API.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="680" fill="#18181a" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600"
        fill="#e8e6da">Discord OAuth2 — UML Sequence Diagram</text>

  <!-- ══════════════════════════════════════════════
       PARTICIPANT HEADERS
  ═══════════════════════════════════════════════ -->

  <!-- Пользователь -->
  <rect x="30" y="48" width="120" height="38" rx="6"
        fill="#083c2e" stroke="#5dcaa5" stroke-width="0.8"/>
  <text x="90" y="72" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
        fill="#9fe1cb">Пользователь</text>

  <!-- Discord Bot -->
  <rect x="210" y="48" width="120" height="38" rx="6"
        fill="#3c3489" stroke="#afa9ec" stroke-width="0.8"/>
  <text x="270" y="72" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
        fill="#ceebf6">Discord Bot</text>

  <!-- Backend -->
  <rect x="390" y="48" width="120" height="38" rx="6"
        fill="#0c3a6e" stroke="#85b7eb" stroke-width="0.8"/>
  <text x="450" y="72" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
        fill="#b5d4f4">Backend</text>

  <!-- Discord API -->
  <rect x="570" y="48" width="120" height="38" rx="6"
        fill="#5c1a0a" stroke="#f09a7a" stroke-width="0.8"/>
  <text x="630" y="72" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
        fill="#f5c4b3">Discord API</text>

  <!-- ══════════════════════════════════════════════
       LIFELINES
  ═══════════════════════════════════════════════ -->
  <line x1="90"  y1="86" x2="90"  y2="630" stroke="rgba(222,220,209,0.25)" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="270" y1="86" x2="270" y2="630" stroke="rgba(222,220,209,0.25)" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="450" y1="86" x2="450" y2="630" stroke="rgba(222,220,209,0.25)" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="630" y1="86" x2="630" y2="630" stroke="rgba(222,220,209,0.25)" stroke-width="0.8" stroke-dasharray="4 4"/>

  <!-- ══════════════════════════════════════════════
       ACTIVATION BARS
  ═══════════════════════════════════════════════ -->
  <!-- Пользователь active bar -->
  <rect x="87"  y="110" width="8" height="480" rx="2"
        fill="#1a2e24" stroke="rgba(93,202,165,0.4)" stroke-width="0.5"/>
  <!-- Discord Bot active bar -->
  <rect x="267" y="120" width="8" height="450" rx="2"
        fill="#201e44" stroke="rgba(175,169,236,0.4)" stroke-width="0.5"/>
  <!-- Backend active bar -->
  <rect x="447" y="270" width="8" height="280" rx="2"
        fill="#0c2240" stroke="rgba(133,183,235,0.4)" stroke-width="0.5"/>
  <!-- Discord API active bar -->
  <rect x="627" y="330" width="8" height="180" rx="2"
        fill="#2e0c04" stroke="rgba(240,153,123,0.4)" stroke-width="0.5"/>

  <!-- ══════════════════════════════════════════════
       MESSAGES
  ═══════════════════════════════════════════════ -->

  <!-- 1. Пользователь → Discord Bot: /login команда -->
  <line x1="97" y1="120" x2="265" y2="120"
        stroke="#9ca89e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="180" y="114" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">/login (slash-команда)</text>

  <!-- 2. Discord Bot → Пользователь: DM с OAuth2-ссылкой -->
  <line x1="265" y1="160" x2="97" y2="160"
        stroke="#9ca89e" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="180" y="154" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">DM: ссылка для авторизации</text>

  <!-- 3. Пользователь → Discord API: переходит по ссылке и подтверждает -->
  <line x1="97" y1="210" x2="625" y2="210"
        stroke="#9ca89e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="204" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">Пользователь подтверждает в Discord</text>

  <!-- 4. Discord API → Backend: callback с кодом -->
  <line x1="627" y1="250" x2="457" y2="250"
        stroke="#9ca89e" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="543" y="244" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">Callback ?code=AUTH_CODE</text>

  <!-- 5. Backend → Discord API: POST /oauth2/token -->
  <line x1="457" y1="290" x2="625" y2="290"
        stroke="#9ca89e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="543" y="284" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">POST /oauth2/token</text>

  <!-- 6. Discord API → Backend: {access_token} -->
  <line x1="625" y1="330" x2="457" y2="330"
        stroke="#9ca89e" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="543" y="324" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">{access_token}</text>

  <!-- 7. Backend → Discord API: GET /users/@me -->
  <line x1="457" y1="370" x2="625" y2="370"
        stroke="#9ca89e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="543" y="364" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">GET /users/@me</text>

  <!-- 8. Discord API → Backend: {discord_id, username} -->
  <line x1="625" y1="410" x2="457" y2="410"
        stroke="#9ca89e" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="543" y="404" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">{discord_id, username}</text>

  <!-- 9. Backend self: Сохранить User в БД -->
  <path d="M455 445 L490 445 L490 470 L459 470"
        fill="none" stroke="#85b7eb" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="498" y="455" text-anchor="start"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#85b7eb">Сохранить User в БД</text>

  <!-- 10. Backend → Discord Bot: {jwt_token} -->
  <line x1="447" y1="505" x2="277" y2="505"
        stroke="#9ca89e" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="362" y="499" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">{jwt_token}</text>

  <!-- 11. Discord Bot → Пользователь: авторизован, открыть лобби -->
  <line x1="265" y1="545" x2="97" y2="545"
        stroke="#9ca89e" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arrow-dash)"/>
  <text x="180" y="539" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="11" fill="#c2c0b6">Авторизован — открыть лобби</text>

  <!-- ══════════════════════════════════════════════
       FOOTER PARTICIPANT BOXES
  ═══════════════════════════════════════════════ -->
  <rect x="30"  y="580" width="120" height="38" rx="6"
        fill="#083c2e" stroke="#5dcaa5" stroke-width="0.8"/>
  <text x="90"  y="604" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
        fill="#9fe1cb">Пользователь</text>

  <rect x="210" y="580" width="120" height="38" rx="6"
        fill="#3c3489" stroke="#afa9ec" stroke-width="0.8"/>
  <text x="270" y="604" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
        fill="#ceebf6">Discord Bot</text>

  <rect x="390" y="580" width="120" height="38" rx="6"
        fill="#0c3a6e" stroke="#85b7eb" stroke-width="0.8"/>
  <text x="450" y="604" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
        fill="#b5d4f4">Backend</text>

  <rect x="570" y="580" width="120" height="38" rx="6"
        fill="#5c1a0a" stroke="#f09a7a" stroke-width="0.8"/>
  <text x="630" y="604" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
        fill="#f5c4b3">Discord API</text>

  <!-- ══════════════════════════════════════════════
       LEGEND
  ═══════════════════════════════════════════════ -->
  <line x1="40"  y1="650" x2="68"  y2="650" stroke="#9ca89e" stroke-width="1.5"/>
  <polygon points="68,646 74,650 68,654" fill="#9ca89e"/>
  <text x="80" y="654" font-family="'Segoe UI', sans-serif" font-size="10" fill="#9ca89e">запрос / вызов</text>

  <line x1="200" y1="650" x2="228" y2="650"
        stroke="#9ca89e" stroke-width="1.3" stroke-dasharray="5 3"/>
  <polygon points="228,646 234,650 228,654" fill="#9ca89e"/>
  <text x="240" y="654" font-family="'Segoe UI', sans-serif" font-size="10" fill="#9ca89e">ответ</text>
</svg>
