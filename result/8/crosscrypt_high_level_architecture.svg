<svg width="100%" viewBox="0 0 720 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CrossCrypt — High-Level Architecture</title>
  <desc>Discord Clients connect to the Backend via REST API and WebSocket. The Backend connects to PostgreSQL and Discord API.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600"
        fill="#1a1a1a">CrossCrypt — High-Level Architecture</text>

  <!-- Discord Client -->
  <rect x="30" y="100" width="130" height="70" rx="8"
        fill="#d6f5eb" stroke="#1a8a6a" stroke-width="1.5"/>
  <text x="95" y="122" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600"
        fill="#0f5c46">Discord Client</text>
  <text x="95" y="140" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#1a8a6a">команды · кнопки</text>
  <text x="95" y="153" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#1a8a6a">embeds · роль-изоляция</text>

  <!-- Backend -->
  <rect x="280" y="80" width="160" height="100" rx="8"
        fill="#d6e8fb" stroke="#1a5fb0" stroke-width="1.5"/>
  <text x="360" y="105" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600"
        fill="#0d3d7a">Backend</text>
  <line x1="295" y1="115" x2="425" y2="115" stroke="#1a5fb0" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="360" y="132" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#1a5fb0">REST API</text>
  <text x="360" y="148" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#1a5fb0">CRUD · сессии · роли</text>
  <text x="360" y="165" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#1a5fb0">WebSocket (real-time)</text>

  <!-- PostgreSQL -->
  <rect x="280" y="280" width="160" height="60" rx="8"
        fill="#ede0fb" stroke="#6a2fb0" stroke-width="1.5"/>
  <text x="360" y="306" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600"
        fill="#3d1270">PostgreSQL</text>
  <text x="360" y="326" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#6a2fb0">комнаты · кроссворды · штрафы</text>

  <!-- Discord API -->
  <rect x="560" y="100" width="130" height="60" rx="8"
        fill="#fde0d5" stroke="#c0411a" stroke-width="1.5"/>
  <text x="625" y="126" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600"
        fill="#7a2010">Discord API</text>
  <text x="625" y="148" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#c0411a">OAuth2 · Gateway</text>

  <!-- Discord Client → Backend (REST API) -->
  <line x1="162" y1="125" x2="278" y2="118"
        stroke="#444444" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="220" y="111" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#333333">REST API</text>

  <!-- Backend → Discord Client (REST response) -->
  <line x1="278" y1="135" x2="162" y2="143"
        stroke="#444444" stroke-width="1.4" stroke-dasharray="5 3"
        marker-end="url(#arrow)"/>
  <text x="220" y="150" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#333333">ответ / push</text>

  <!-- Backend ↔ PostgreSQL -->
  <line x1="360" y1="182" x2="360" y2="278"
        stroke="#6a2fb0" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="375" y="236" text-anchor="start"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#6a2fb0">SQL</text>
  <line x1="345" y1="278" x2="345" y2="182"
        stroke="#6a2fb0" stroke-width="1.4" stroke-dasharray="5 3"
        marker-end="url(#arrow)"/>

  <!-- Backend → Discord API -->
  <line x1="442" y1="118" x2="558" y2="118"
        stroke="#c0411a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="500" y="111" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#7a2010">Bot / OAuth2</text>

  <!-- Discord API → Backend -->
  <line x1="558" y1="135" x2="442" y2="135"
        stroke="#c0411a" stroke-width="1.4" stroke-dasharray="5 3"
        marker-end="url(#arrow)"/>
  <text x="500" y="150" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="10" fill="#7a2010">events / tokens</text>

  <!-- Discord Client ↔ Discord API (user in Discord) -->
  <path d="M95 170 Q95 230 625 168" fill="none"
        stroke="#1a8a6a" stroke-width="1" stroke-dasharray="4 3" opacity="0.55"/>
  <text x="360" y="222" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="9" fill="#1a8a6a" opacity="0.85">
    пользователь находится в Discord
  </text>

  <!-- LEGEND -->
  <line x1="40" y1="386" x2="70" y2="386" stroke="#444444" stroke-width="1.4"/>
  <text x="76" y="390" font-family="'Segoe UI', sans-serif" font-size="10" fill="#333333">запрос</text>
  <line x1="130" y1="386" x2="160" y2="386" stroke="#444444" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="166" y="390" font-family="'Segoe UI', sans-serif" font-size="10" fill="#333333">ответ</text>
</svg>
